name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run tests
        run: |
          chmod +x bin/roninyolo
          bats tests/

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './bin'
