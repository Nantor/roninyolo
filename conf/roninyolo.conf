# Which container runtime to use
RY_DOCKER_BIN="docker"    # or "podman"

# Image that already has opencode installed
RY_IMAGE="myregistry.local/opencode:latest"

# Host and container paths for opencode configuration
# Host: standard Linux config dir: ~/.config/opencode
RY_HOST_CONFIG_DIR="$HOME/.config/opencode"

# Container: config directory for the non-root "opencode" user
RY_CONTAINER_CONFIG_DIR="/home/opencode/.config/opencode"

# Workdir inside the container where $PWD is mounted
RY_WORKDIR="/work"

# Run as the container's "opencode" user (non-root by default; can be overridden)
RY_DOCKER_USER="opencode"

# Env vars passed into the container
RY_ENV_VARS=(
  "opencode_LOG_LEVEL=info"
  "NO_COLOR=1"
)

# Additional volumes (optional)
RY_ADDITIONAL_VOLUMES=(
  # "/data/shared:/data:ro"
)

# Extra docker run args (optional)
RY_DOCKER_RUN_EXTRA_ARGS=(
  # "--network=host"
)

# Dockerfile + context used when you call "roninyolo build"
RY_DOCKERFILE="/opt/roninyolo/Dockerfile"
RY_BUILD_CONTEXT="/opt/roninyolo"

# Default command (when you just run "roninyolo")
RY_DEFAULT_CMD=(opencode)
